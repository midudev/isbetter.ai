packages:
  - '.'
allowBuilds:
  esbuild: true
  workerd: true
# Astro lists sharp as optional for image transforms; we use passthrough.
ignoredOptionalDependencies:
  - sharp
# miniflare pulls sharp for local Cloudflare Images simulation — unused here.
overrides:
  'miniflare>sharp': '-'
minimumReleaseAge: 1440
trustLockfile: true